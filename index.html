<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registration Form</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-white-500">

  <div class="bg-white w-96 rounded-xl shadow-lg p-8">

    <h1 class="text-2xl font-bold text-center mb-6">Register</h1>

    <form id="myForm">

      <!-- Name -->
      <label class="block font-semibold mb-1">Name</label>
      <input type="text" id="name" placeholder="Enter your name"
        class="w-full border rounded-lg px-3 py-2 mb-1" />
      <p id="nameError" class="text-red-500 text-sm mb-4 hidden">Name is required.</p>

      <!-- Email -->
      <label class="block font-semibold mb-1">Email</label>
      <input type="text" id="email" placeholder="you@example.com"
        class="w-full border rounded-lg px-3 py-2 mb-1" />
      <p id="emailError" class="text-red-500 text-sm mb-4 hidden">Enter a valid email.</p>

      <!-- Password -->
      <label class="block font-semibold mb-1">Password</label>
      <input type="password" id="password" placeholder="Min 6 characters"
        class="w-full border rounded-lg px-3 py-2 mb-1" />
      <p id="passwordError" class="text-red-500 text-sm mb-4 hidden">Password must be at least 6 characters.</p>

      <!-- Button -->
      <button type="submit"
        class="w-full bg-indigo-100 text-white font-bold py-2 rounded-lg hover:bg-indigo-300">
        Register
      </button>

    </form>

    <!-- Success Message -->
    <p id="successMsg" class="text-green-600 font-bold text-center mt-4 hidden">
    Registration successful!
    </p>

  </div>

<script>
  const form = document.getElementById("myForm");

  form.addEventListener("submit", function (e) {
    e.preventDefault();

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    let isValid = true;

    // Name check
    if (name === "") {
      document.getElementById("nameError").classList.remove("hidden");
      isValid = false;
    } else {
      document.getElementById("nameError").classList.add("hidden");
    }

    // Email check
    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailPattern.test(email)) {
      document.getElementById("emailError").classList.remove("hidden");
      isValid = false;
    } else {
      document.getElementById("emailError").classList.add("hidden");
    }

    // Password check
    if (password.length < 6) {
      document.getElementById("passwordError").classList.remove("hidden");
      isValid = false;
    } else {
      document.getElementById("passwordError").classList.add("hidden");
    }

    // If all valid
    if (isValid) {
      document.getElementById("successMsg").classList.remove("hidden");
      form.reset();
    }
  });
</script>

</body>
</html>
